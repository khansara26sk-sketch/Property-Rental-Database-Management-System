<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Property Rental System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="auth-page">
    <div class="auth-left">
      <div>
        <div class="auth-badge">🏢 Smart Rental Platform</div>
        <h1 class="auth-title">Create your account and start managing rentals smarter.</h1>
        <p class="auth-copy">
          Register as an administrator, branch manager, or staff member to access
          the property rental management system.
        </p>
      </div>
      <p class="muted">Create a new account to continue.</p>
    </div>

    <div class="auth-right">
      <div class="panel auth-panel">
        <h2>Create Account</h2>
        <p>Fill in your details to sign up.</p>

        <form class="auth-form" onsubmit="event.preventDefault(); signUp();">
          <div class="form-group">
            <label>Full Name</label>
            <input id="signup_name" class="input" type="text" placeholder="Enter full name" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input id="signup_email" class="input" type="email" placeholder="Enter email" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input id="signup_password" class="input" type="password" placeholder="Create password" required>
          </div>

          <div class="form-group">
            <label>Role</label>
            <select id="signup_role" class="select" required>
              <option value="">Select role</option>
              <option>Administrator</option>
              <option>Branch Manager</option>
              <option>Staff Member</option>
            </select>
          </div>

          <button class="btn btn-primary" type="submit">Sign Up</button>
          <button class="btn btn-secondary" type="button" onclick="window.location.href='login.html'">
            Back to Login
          </button>
        </form>

        <p id="signupMessage" class="muted" style="margin-top:12px;"></p>
      </div>
    </div>
  </section>

  <script>
  const API = "http://localhost:3000";

  async function signUp() {
    const name = document.getElementById("signup_name").value.trim();
    const email = document.getElementById("signup_email").value.trim();
    const password = document.getElementById("signup_password").value.trim();
    const role = document.getElementById("signup_role").value;
    const msg = document.getElementById("signupMessage");

    msg.textContent = "";

    try {
      const res = await fetch(API + "/auth/signup", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, password, role })
      });

      const data = await res.json();

      if (!res.ok) {
        msg.textContent = data.message || "Signup failed";
        return;
      }

      msg.textContent = data.message;

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    } catch (error) {
      console.error(error);
      msg.textContent = "Server connection failed";
    }
  }
</script>
</body>
</html>
